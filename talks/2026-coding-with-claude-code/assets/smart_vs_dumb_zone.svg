<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui, -apple-system, Segoe UI, sans-serif"
     style="--primary:#002452; --accent:#b08d2b; --ink:#1a1a1a; --neutral:#f3f1ea; --paper:#ffffff; --stroke:#c9c2ad; --smart:#3f7a4c; --smart-fill:#dfeede; --dumb:#8c8478; --dumb-fill:#e8e6df; --muted:#5a5650; --alert:#9a342a; --alert-fill:#fbeaea; --alert-stroke:#c2604f;">

  <!-- ===== TITLE ===== -->
  <text x="64" y="56" fill="var(--primary,#11335d)" font-weight="700" font-size="33">Usable attention degrades before the advertised window</text>
  <text x="64" y="88" fill="var(--muted,#5a5650)" font-size="21">Decision quality vs. context size: the smart zone is a correctness control, not a capacity number</text>

  <!-- ===== PLOT FRAME (plot area x 120..940, y 130..480) ===== -->

  <!-- SMART ZONE shaded region: x 120..560 -->
  <rect x="120" y="130" width="440" height="350" fill="var(--smart-fill,#dfeede)"/>
  <!-- DUMB ZONE shaded region: x 560..940 -->
  <rect x="560" y="130" width="380" height="350" fill="var(--dumb-fill,#e8e6df)"/>

  <!-- subtle horizontal gridline (max quality) -->
  <line x1="120" y1="176" x2="940" y2="176" stroke="var(--stroke,#c9c2ad)" stroke-width="1" stroke-dasharray="3 6"/>

  <!-- axes -->
  <line x1="120" y1="480" x2="940" y2="480" stroke="var(--ink,#1a1a1a)" stroke-width="2"/>
  <line x1="120" y1="480" x2="120" y2="130" stroke="var(--ink,#1a1a1a)" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="58" y="305" fill="var(--ink,#1a1a1a)" font-size="21" font-weight="600" transform="rotate(-90 58 305)" text-anchor="middle">decision quality</text>
  <text x="112" y="150" fill="var(--muted,#5a5650)" font-size="16" text-anchor="end">high</text>
  <text x="112" y="476" fill="var(--muted,#5a5650)" font-size="16" text-anchor="end">low</text>

  <!-- X axis label -->
  <text x="530" y="560" fill="var(--ink,#1a1a1a)" font-size="21" font-weight="600" text-anchor="middle">context size (tokens)</text>

  <!-- source / framing note: the degradation is positional bias, not the quadratic cost -->
  <text x="120" y="600" fill="var(--muted,#5a5650)" font-size="15" opacity="0.9">Quality dip = positional bias (Liu et al., "Lost in the Middle", TACL 2024; RULER), a separate phenomenon from the O(n²) cost.</text>

  <!-- ===== THE CURVE ===== -->
  <!-- smart-zone segment: flat-high plateau (drawn in primary blue) -->
  <path d="M 120 178 L 360 176 C 460 175, 520 178, 555 188"
        fill="none" stroke="var(--primary,#11335d)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- dumb-zone segment: falling grey tail toward 1M -->
  <path d="M 555 188
           C 575 196, 585 224, 600 268
           C 622 330, 660 388, 720 422
           C 790 458, 860 470, 930 474"
        fill="none" stroke="var(--dumb,#8c8478)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- knee marker at the cliff -->
  <circle cx="557" cy="187" r="6.5" fill="var(--accent,#b08d2b)" stroke="#ffffff" stroke-width="2"/>

  <!-- ===== CLIFF: vertical dashed line at ~100K (x=560) ===== -->
  <line x1="560" y1="130" x2="560" y2="480" stroke="var(--accent,#b08d2b)" stroke-width="3" stroke-dasharray="9 7"/>
  <!-- 100K tick -->
  <line x1="560" y1="480" x2="560" y2="491" stroke="var(--ink,#1a1a1a)" stroke-width="2"/>
  <text x="560" y="513" fill="var(--ink,#1a1a1a)" font-size="20" font-weight="700" text-anchor="middle">~100K</text>

  <!-- faint 1M mark near right edge -->
  <line x1="912" y1="466" x2="912" y2="491" stroke="var(--dumb,#8c8478)" stroke-width="2" stroke-dasharray="4 5"/>
  <text x="912" y="513" fill="var(--muted,#5a5650)" font-size="19" text-anchor="middle" opacity="0.75">1M</text>

  <!-- cliff callout -->
  <line x1="560" y1="135" x2="606" y2="118" stroke="var(--accent,#b08d2b)" stroke-width="2"/>
  <rect x="600" y="92" width="316" height="50" rx="8" fill="var(--paper,#ffffff)" stroke="var(--accent,#b08d2b)" stroke-width="1.5"/>
  <text x="616" y="113" font-size="18" font-weight="700" fill="var(--accent,#b08d2b)">A model-specific heuristic,</text>
  <text x="616" y="134" font-size="18" fill="var(--ink,#1a1a1a)">not a measured constant.</text>

  <!-- ===== ZONE LABELS ===== -->
  <rect x="150" y="200" width="158" height="36" rx="18" fill="var(--smart,#3f7a4c)"/>
  <text x="229" y="225" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">SMART ZONE</text>
  <text x="150" y="266" font-size="17" fill="var(--smart,#3f7a4c)" font-weight="600">flat-high: it can actually think</text>

  <rect x="690" y="150" width="148" height="36" rx="18" fill="var(--dumb,#8c8478)"/>
  <text x="764" y="175" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">DUMB ZONE</text>

  <!-- annotation on the tail -->
  <line x1="772" y1="446" x2="772" y2="320" stroke="var(--dumb,#8c8478)" stroke-width="1.5" stroke-dasharray="3 4"/>
  <circle cx="772" cy="446" r="4.5" fill="var(--dumb,#8c8478)"/>
  <rect x="610" y="250" width="324" height="70" rx="10" fill="var(--paper,#ffffff)" stroke="var(--stroke,#c9c2ad)" stroke-width="1.5"/>
  <text x="626" y="276" font-size="17" fill="var(--ink,#1a1a1a)">A 200K / 1M window just ships you</text>
  <text x="626" y="298" font-size="17" fill="var(--ink,#1a1a1a)"><tspan font-weight="700" fill="var(--dumb,#8c8478)">more dumb zone</tspan>, good for retrieval,</text>
  <text x="626" y="314" font-size="17" fill="var(--ink,#1a1a1a)">not for thinking.</text>

  <!-- our-stakes flag inside dumb zone -->
  <rect x="610" y="404" width="324" height="56" rx="8" fill="var(--alert-fill,#fbeaea)" stroke="var(--alert-stroke,#c2604f)" stroke-width="1.5"/>
  <text x="626" y="428" font-size="16.5" font-weight="700" fill="var(--alert,#9a342a)">For us: the dumb zone manufactures</text>
  <text x="626" y="450" font-size="16.5" font-weight="700" fill="var(--alert,#9a342a)">silently-wrong physics.</text>

  <!-- ===== INSET: quadratic-attention motif ===== -->
  <rect x="982" y="130" width="266" height="370" rx="12" fill="var(--neutral,#f3f1ea)" stroke="var(--stroke,#c9c2ad)" stroke-width="1.5"/>
  <text x="1115" y="158" font-size="18" font-weight="700" fill="var(--primary,#11335d)" text-anchor="middle">a separate axis: cost</text>
  <text x="1115" y="180" font-size="15" fill="var(--muted,#5a5650)" text-anchor="middle">attention is O(n²), not the cause</text>

  <!-- token relationship matrix: 4x4 existing block + new row + new column -->
  <g fill="var(--primary,#11335d)">
    <rect x="1016" y="200" width="34" height="34" rx="4"/>
    <rect x="1054" y="200" width="34" height="34" rx="4"/>
    <rect x="1092" y="200" width="34" height="34" rx="4"/>
    <rect x="1130" y="200" width="34" height="34" rx="4"/>

    <rect x="1016" y="238" width="34" height="34" rx="4"/>
    <rect x="1054" y="238" width="34" height="34" rx="4"/>
    <rect x="1092" y="238" width="34" height="34" rx="4"/>
    <rect x="1130" y="238" width="34" height="34" rx="4"/>

    <rect x="1016" y="276" width="34" height="34" rx="4"/>
    <rect x="1054" y="276" width="34" height="34" rx="4"/>
    <rect x="1092" y="276" width="34" height="34" rx="4"/>
    <rect x="1130" y="276" width="34" height="34" rx="4"/>

    <rect x="1016" y="314" width="34" height="34" rx="4"/>
    <rect x="1054" y="314" width="34" height="34" rx="4"/>
    <rect x="1092" y="314" width="34" height="34" rx="4"/>
    <rect x="1130" y="314" width="34" height="34" rx="4"/>
  </g>
  <!-- new token: added ROW (bottom) -->
  <g fill="var(--accent,#b08d2b)">
    <rect x="1016" y="352" width="34" height="34" rx="4"/>
    <rect x="1054" y="352" width="34" height="34" rx="4"/>
    <rect x="1092" y="352" width="34" height="34" rx="4"/>
    <rect x="1130" y="352" width="34" height="34" rx="4"/>
  </g>
  <!-- new token: added COLUMN (right) -->
  <g fill="var(--accent,#b08d2b)">
    <rect x="1168" y="200" width="34" height="34" rx="4"/>
    <rect x="1168" y="238" width="34" height="34" rx="4"/>
    <rect x="1168" y="276" width="34" height="34" rx="4"/>
    <rect x="1168" y="314" width="34" height="34" rx="4"/>
    <rect x="1168" y="352" width="34" height="34" rx="4"/>
  </g>
  <!-- corner cell where new row meets new column -->
  <rect x="1168" y="352" width="34" height="34" rx="4" fill="var(--accent,#b08d2b)" stroke="#ffffff" stroke-width="2"/>

  <!-- row / column annotations -->
  <text x="1221" y="284" font-size="14" font-weight="700" fill="var(--accent,#b08d2b)" text-anchor="middle" transform="rotate(90 1221 284)">+1 column</text>
  <text x="1090" y="406" font-size="14" font-weight="700" fill="var(--accent,#b08d2b)" text-anchor="middle">+1 row</text>

  <text x="1115" y="438" font-size="15" fill="var(--ink,#1a1a1a)" text-anchor="middle">each token adds a row <tspan font-weight="700">and</tspan> a</text>
  <text x="1115" y="458" font-size="15" fill="var(--ink,#1a1a1a)" text-anchor="middle">column, pairs grow as</text>

  <!-- binom(n,2) expression: proper vertical (n over 2) stack -->
  <g fill="var(--primary,#11335d)" font-weight="700">
    <!-- big parentheses -->
    <text x="1043" y="490" font-size="40" text-anchor="middle">(</text>
    <text x="1075" y="490" font-size="40" text-anchor="middle">)</text>
    <!-- stacked n over 2 -->
    <text x="1059" y="476" font-size="16" text-anchor="middle">n</text>
    <text x="1059" y="494" font-size="16" text-anchor="middle">2</text>
    <!-- right-hand side -->
    <text x="1090" y="487" font-size="21" text-anchor="start">= n(n−1)/2</text>
  </g>

  <!-- ===== CAPTION STRIP ===== -->
  <rect x="64" y="630" width="1152" height="62" rx="10" fill="var(--primary,#11335d)"/>
  <rect x="64" y="630" width="8" height="62" rx="4" fill="var(--accent,#b08d2b)"/>
  <text x="92" y="660" font-size="22" font-weight="700" fill="#ffffff">Sizing a task to fit the smart zone is a correctness control.</text>
  <text x="92" y="683" font-size="20" fill="var(--neutral,#f3f1ea)">Clear, don't compact: start each unit of work from a fresh, small context.</text>
</svg>